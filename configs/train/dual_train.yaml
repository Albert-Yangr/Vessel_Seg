# @package _global_

# =============================================================================
# 基础双分支 CPS 训练配置
# -----------------------------------------------------------------------------
# 这份配置对应 train/dual_train.py。
# 当前实验设置：
#   - 数据集：Parse
#   - 监督形式：切片弱监督标签 .slice.nii.gz
#   - 半监督方法：Dual-Branch CPS
#   - 伪标签模式：soft pseudo label
#   - ramp-up：关闭，也就是冷启动
# =============================================================================

defaults:
  - /trainer: default
  - /hydra: default
  - /model: dyn_unet_base
  - /data: Parse
  - _self_

# -----------------------------------------------------------------------------
# 实验基本信息
# -----------------------------------------------------------------------------
data_name: Parse
loss_name: 软标签-冷启动
seed: 43

experiment_note: "测试基础 CPS 使用软伪标签且关闭 ramp-up 的效果"

# -----------------------------------------------------------------------------
# 路径设置
# -----------------------------------------------------------------------------
chkpt_folder: /home/yangrui/Project/Base-model/local_results/checkpoints
experiment_record_root: /home/yangrui/Project/Base-model/local_results/experiments
path_to_chkpt: null
resume_ckpt_path: null

# -----------------------------------------------------------------------------
# 核心训练超参数
# -----------------------------------------------------------------------------
label_suffix: ".slice.nii.gz"   # 使用切片弱监督标签
input_size: [128, 128, 128]
val_frequency: 2000
batch_size: 2
repeats: 10

# ramp_epochs=0 表示关闭 ramp-up。
# 当前总损失为：loss_sup + pseudo_weight * loss_ps。
ramp_epochs: 0
pseudo_weight: 0.5

# hard: 传统 CPS，两个分支互相学习 0/1 hard pseudo label。
# soft: 两个分支概率图随机混合成 soft pseudo label，两个分支共同学习。
pseudo_label_mode: soft

# -----------------------------------------------------------------------------
# 优化器
# -----------------------------------------------------------------------------
optimizer:
  lr: 1e-4
  weight_decay: 1e-5

# -----------------------------------------------------------------------------
# 损失函数配置
# -----------------------------------------------------------------------------
loss_configs:
  # 完整标签或普通标签监督损失。
  label_loss:
    _target_: utils.dual_branch.simple_loss.SimpleSliceLoss
    dice_weight: 0.9
    bce_weight: 0.1

  # 切片弱监督损失。
  # 因为 label_suffix=".slice.nii.gz"，dual_train.py 会选择这个损失。
  # 当前 affinity_weight=0, tv_weight=0，因此实际只使用有效切片区域上的 Dice+BCE。
  slice_loss:
    _target_: utils.dual_branch.simple_loss.SparseSliceLoss
    dice_weight: 0.9
    bce_weight: 0.1
    affinity_weight: 0
    tv_weight: 0
    ignore_index: 255

  # 无标签伪标签损失。
  pseudo_loss:
    _target_: utils.dual_branch.simple_loss.SimplePseudoLoss
    dice_weight: 0.9
    ce_weight: 0.1

# -----------------------------------------------------------------------------
# PyTorch Lightning Trainer
# -----------------------------------------------------------------------------
trainer:
  lightning_trainer:
    _target_: lightning.pytorch.trainer.trainer.Trainer
    _partial_: True
    max_epochs: 150
    max_time: "00:48:00:00"
    max_steps: -1
    accelerator: gpu
    devices: [5]
    precision: 16-mixed
    check_val_every_n_epoch: null
    num_sanity_val_steps: 0

# -----------------------------------------------------------------------------
# DataLoader
# -----------------------------------------------------------------------------
# 当前 3D 医学图像读取和随机裁剪较重，num_workers=8, prefetch_factor=3
# 能让数据预取队列更深，减少 GPU 等数据的卡顿。
dataloader:
  _target_: "torch.utils.data.DataLoader"
  num_workers: 8
  batch_size: ${batch_size}
  pin_memory: True
  persistent_workers: True
  prefetch_factor: 3
