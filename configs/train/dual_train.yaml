# @package _global_

# =============================================================================
# 基础双分支 CPS 训练配置
# -----------------------------------------------------------------------------
# 当前实验设置：
#   - 数据集：Parse
#   - 监督形式：切片弱监督标签 .slice.nii.gz
#   - 半监督方法：Dual-Branch CPS
#   - 伪标签模式：soft pseudo label
#   - ramp-up：关闭，也就是冷启动
#   - 伪标签损失区域：
#       * 无标签样本：全区域参与 CPS
#       * 有切片弱标注样本：仅 mask == 255 的未标注区域参与 CPS
# =============================================================================

defaults:
  - /trainer: default
  - /hydra: default
  - /model: dyn_unet_base
  - /data: Parse
  - _self_

# -----------------------------------------------------------------------------
# 实验基本信息
# -----------------------------------------------------------------------------
data_name: Parse
loss_name: 软标签-冷启动
seed: 43
experiment_note: "测试基础 CPS 使用软伪标签、关闭 ramp-up，并在弱标注样本未标注区域加入伪标签损失。"

# -----------------------------------------------------------------------------
# 路径设置
# -----------------------------------------------------------------------------
chkpt_folder: /home/yangrui/Project/Base-model/local_results/checkpoints
experiment_record_root: /home/yangrui/Project/Base-model/local_results/experiments
path_to_chkpt: null
resume_ckpt_path: null

# -----------------------------------------------------------------------------
# 核心训练超参数
# -----------------------------------------------------------------------------
label_suffix: ".slice.nii.gz"
input_size: [128, 128, 128]
val_frequency: 2000
batch_size: 2
repeats: 10

# 有标签流随机裁剪约束。
# min_valid_label_pixels > 0 时，要求 labeled crop 至少包含这些非 255 的有效标注像素。
# 这可以避免切片弱监督样本随机裁到完全没有标注切片的位置。
min_valid_label_pixels: 1
max_labeled_crop_retries: 20

# ramp_epochs=0 表示关闭 ramp-up，伪标签损失从训练开始直接使用 pseudo_weight。
ramp_epochs: 0
pseudo_weight: 0.5

# hard: 传统 CPS，两个分支互相学习 0/1 hard pseudo label。
# soft: 两个分支概率图随机混合成 soft pseudo label，两个分支共同学习。
pseudo_label_mode: soft

# -----------------------------------------------------------------------------
# 优化器
# -----------------------------------------------------------------------------
optimizer:
  lr: 1e-4
  weight_decay: 1e-5

# -----------------------------------------------------------------------------
# 损失函数配置
# -----------------------------------------------------------------------------
loss_configs:
  label_loss:
    _target_: utils.dual_branch.simple_loss.SimpleSliceLoss
    dice_weight: 0.9
    bce_weight: 0.1

  # 因为 label_suffix=".slice.nii.gz"，dual_train.py 会选择 slice_loss。
  # 当前 affinity_weight=0, tv_weight=0，因此监督项实际为有效切片区域上的 Dice+BCE。
  slice_loss:
    _target_: utils.dual_branch.simple_loss.SparseSliceLoss
    dice_weight: 0.9
    bce_weight: 0.1
    affinity_weight: 0
    tv_weight: 0
    ignore_index: 255

  pseudo_loss:
    _target_: utils.dual_branch.simple_loss.SimplePseudoLoss
    dice_weight: 0.9
    ce_weight: 0.1

# -----------------------------------------------------------------------------
# PyTorch Lightning Trainer
# -----------------------------------------------------------------------------
trainer:
  lightning_trainer:
    _target_: lightning.pytorch.trainer.trainer.Trainer
    _partial_: True
    max_epochs: 150
    max_time: "00:48:00:00"
    max_steps: -1
    accelerator: gpu
    devices: [0]
    precision: 16-mixed
    check_val_every_n_epoch: null
    num_sanity_val_steps: 0

# -----------------------------------------------------------------------------
# DataLoader
# -----------------------------------------------------------------------------
dataloader:
  _target_: "torch.utils.data.DataLoader"
  num_workers: 8
  batch_size: ${batch_size}
  pin_memory: True
  persistent_workers: True
  prefetch_factor: 3
