# @package _global_

# =============================================================================
# 动态小框对比学习训练配置
# -----------------------------------------------------------------------------
# 对应入口脚本：
#   train/dyn_box_train.py
#
# 对应核心模块：
#   utils/dual_cl/model.py         双分支 DynUNet，并返回 decoder feature
#   utils/dual_cl/module.py        Lightning training loop 封装
#   utils/dual_cl/loss_dyn_box.py  CPS + 连通域自适应 ROI 对比学习总损失
#
# 当前实验含义：
#   在基础 Dual-CPS 半监督框架上，加入“连通域形态感知自适应小框对比学习”。
#   对每个血管锚点，不再裁固定正方形，而是找到该锚点所在 2D 连通域，
#   用包围盒框住完整连通域，再重采样到固定 roi_size 做对比学习。
# =============================================================================

defaults:
  - /trainer: default
  - /hydra: default
  - /model: dyn_unet_base
  - /data: CAS2023
  - _self_

# -----------------------------------------------------------------------------
# 实验命名与随机性
# -----------------------------------------------------------------------------
data_name: CAS2023
loss_name: 动态小框-新对比-温度
seed: 43

# -----------------------------------------------------------------------------
# 输出与断点
# -----------------------------------------------------------------------------
# checkpoint 会保存到：
#   ${chkpt_folder}/${data_name}/${loss_name}
# 同时 train/dyn_box_train.py 会把完整 Hydra 配置保存为 train_config.yaml，
# 并在 experiment_record_root 下生成实验记录，方便后续回看。
chkpt_folder: /home/yangrui/Project/Base-model/local_results/checkpoints
experiment_record_root: /home/yangrui/Project/Base-model/local_results/experiments
path_to_chkpt: null          # 可选：加载基础 nnUNet/DynUNet 预训练权重
resume_ckpt_path: null       # 可选：从 Lightning checkpoint 断点恢复

# -----------------------------------------------------------------------------
# 数据与训练长度
# -----------------------------------------------------------------------------
label_suffix: ".slice.nii.gz"     # 切片弱监督标签，未标注区域通常为 255
input_size: [128, 128, 128]
val_frequency: 500                # Lightning val_check_interval，按 step 触发验证
batch_size: 2
repeats: 10                       # labeled/unlabeled dataset 的虚拟重复倍数

# labeled 随机裁剪保护：
#   切片弱标注很稀疏，普通随机裁剪可能完全裁不到标注切片。
#   min_valid_label_pixels > 0 时，会要求 labeled crop 至少包含这些非 255 标注像素。
min_valid_label_pixels: 1
max_labeled_crop_retries: 20

# -----------------------------------------------------------------------------
# CPS 伪标签损失控制
# -----------------------------------------------------------------------------
# ramp_epochs:
#   >0 表示伪标签损失从较小权重逐步 ramp-up 到 pseudo_weight；
#   =0 表示关闭 ramp-up，训练一开始就直接使用 pseudo_weight。
ramp_epochs: 100
pseudo_weight: 0.5

# pseudo_label_mode:
#   hard: 分支 1 学分支 2 的 0/1 硬伪标签，分支 2 学分支 1 的 0/1 硬伪标签。
#   soft: 两个分支的概率图随机混合成 soft pseudo label，两个分支共同学习。
pseudo_label_mode: hard

optimizer:
  lr: 1e-4
  weight_decay: 1e-5

loss_configs:
  # 完整标签监督损失。当前 label_suffix 包含 ".slice"，因此实际不会走这里。
  label_loss:
    _target_: utils.dual_branch.simple_loss.SimpleSliceLoss
    dice_weight: 0.9
    bce_weight: 0.1

  # 切片弱监督损失。
  # 只在 mask != ignore_index 的真实标注区域计算 Dice + BCE。
  slice_loss:
    _target_: utils.dual_branch.simple_loss.SparseSliceLoss
    dice_weight: 0.9
    bce_weight: 0.1
    affinity_weight: 0
    tv_weight: 0
    ignore_index: 255

  # CPS 伪标签损失。
  # loss_dyn_box.py 会在两个区域调用它：
  #   1. 无标签样本全图；
  #   2. 有切片弱标注样本的 mask == 255 未知区域。
  pseudo_loss:
    _target_: utils.dual_branch.simple_loss.SimplePseudoLoss
    dice_weight: 0.9
    ce_weight: 0.1

  # ---------------------------------------------------------------------------
  # 连通域形态感知自适应 ROI 对比学习
  # ---------------------------------------------------------------------------
  contrastive:
    # 总开关。false 时只训练 Dual-CPS，不计算 CL。
    enable: true

    # 对比学习损失在总损失中的权重：
    #   total_loss = loss_sup + pseudo_weight * loss_ps + weight * loss_cl
    weight: 0.2

    # CL warmup：
    #   前 warmup_epochs 轮只用有标签样本做 CL，并更新 EMA 原型；
    #   达到 warmup 后，才加入无标签可靠伪标签区域的 CL。
    warmup_epochs: 10

    # 固定温度。dynamic_temperature.enable=false 时使用该值。
    temperature: 0.5

    # decoder feature 的通道维度，需要和 model.py 返回的 feature 通道一致。
    feat_dim: 32

    # 动态温度控制：
    #   根据正样本相似度和难负样本相似度的差距调节温度。
    #   差距大，样本可靠，使用低温度强化区分；
    #   差距小，样本不确定，使用高温度降低梯度冲击。
    dynamic_temperature:
      enable: true
      min_temperature: 0.1
      max_temperature: 0.5

    # -------------------------------------------------------------------------
    # 锚点采样与 ROI 重采样
    # -------------------------------------------------------------------------
    # 每个样本最多采样多少个血管锚点和背景锚点。
    # 实际小框数可能更少，因为没有足够前景/背景时会跳过。
    num_patches: 12

    # 自适应 ROI 最终统一重采样到 roi_size x roi_size。
    # 注意：自适应发生在重采样前，原始 bbox 可以很长、很大、非正方形。
    roi_size: 16

    # fallback 固定小框尺寸：
    # 当连通域太小、太大、bbox 异常、重采样后前景太少时，退回固定小框。
    base_patch_size: 16

    # -------------------------------------------------------------------------
    # 连通域搜索与 flood-fill
    # -------------------------------------------------------------------------
    # search_size=0 表示在整张 2D 切片内搜索锚点所在连通域；
    # >0 表示只在锚点附近 search_size x search_size 局部窗口内搜索。
    search_size: 0

    # flood-fill 最大迭代次数。过小可能截断长条血管，过大增加耗时。
    max_flood_iters: 256

    # 连通域像素数下限。小于该值认为可能是噪点，退回固定小框。
    min_component_pixels: 2

    # 连通域像素数上限。大于该值认为过大或异常，退回固定小框。
    max_component_pixels: 100000

    # -------------------------------------------------------------------------
    # 包围盒扩张与异常保护
    # -------------------------------------------------------------------------
    # bbox 外扩比例。比如 0.25 表示按连通域较长边的 25% 向外扩一圈上下文。
    margin_ratio: 0.25

    # 最小/最大外扩像素数，避免细血管没有背景上下文，也避免粗大区域扩得过远。
    min_margin: 3
    max_margin: 16

    # bbox 占整张 2D 特征图面积的最大比例。
    # 1.0 表示允许覆盖整张切片；如果想更保守可以降到 0.5 或 0.75。
    max_bbox_area_ratio: 1.0

    # ROI 重采样后，前景像素少于该值则认为小框无效，退回固定小框。
    min_resized_fg_pixels: 2

    # 微观对比中的近邻背景核。
    # 会对血管 mask 做 max_pool 膨胀，只选紧贴血管外壁的背景作为难负样本。
    near_bg_kernel: 9

    # EMA 原型更新动量。
    # 越接近 1，原型越稳定；越小，当前 batch 对原型影响越大。
    proto_momentum: 0.95

    # 忽略标签。CL 小框中不可靠区域、其他未连接血管片段会置为该值。
    ignore_index: 255

    # -------------------------------------------------------------------------
    # 无标签 CL 可靠伪标签筛选
    # -------------------------------------------------------------------------
    # 这些参数只影响“无标签对比学习的小框采样”，不直接影响 CPS 伪标签损失。
    #
    # avg_prob >= min_fg_prob 认为是可靠前景；
    # avg_prob <= max_bg_prob 认为是可靠背景；
    # 其他区域置为 ignore_index，不参与无标签 CL 采样。
    pseudo_confidence: 0.75
    use_reliable_agreement: true   # 是否要求两个分支 hard 预测一致
    max_branch_diff: 0.2           # 两分支概率差超过该值则认为不可靠；设为 -1 可关闭
    min_fg_prob: 0.75
    max_bg_prob: 0.25

trainer:
  lightning_trainer:
    _target_: lightning.pytorch.trainer.trainer.Trainer
    _partial_: True
    max_epochs: 150
    max_time: "00:48:00:00"
    max_steps: -1
    accelerator: gpu
    devices: [3]
    precision: 16-mixed
    check_val_every_n_epoch: null
    num_sanity_val_steps: 0

dataloader:
  _target_: "torch.utils.data.DataLoader"
  num_workers: 8
  batch_size: ${batch_size}
  pin_memory: True
  persistent_workers: True
  prefetch_factor: 2
