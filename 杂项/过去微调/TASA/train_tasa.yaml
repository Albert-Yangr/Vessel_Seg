# @package _global_
defaults:
  - /train
  - override /data: imageCAS
  - _self_

seed: 42
data_name: ${data}
loss_name: TASA-蛇形卷积2

path_to_chkpt: /home/yangrui/Project/Base-model/local_results/checkpoints/base.pt
chkpt_folder: /home/yangrui/Project/Base-model/local_results/checkpoints

devices: [1,0]
label_suffix: ".label.nii.gz"

batch_size: 2
repeats: 10
lr: 0.0001

# 🔥 新增：分层学习率倍率控制 (Discriminative Learning Rates)
lr_multipliers:
  encoder: 0.1   # 编码器：极小学习率，保护大模型管状流形先验
  decoder: 1.0   # 解码器：正常学习率，适应当前数据集的领域偏差
  expert: 10.0   # TASA专家：激进学习率，加速随机初始化的旁支收敛

# ==========================================
# 🌟 拓扑控制中心 (专家模块与 Loss)
# ==========================================
# 专家模块选项: "asymmetric", "snake", "lka", "coord"
# 您可以使用单一字符串，或者提供一个包含 5 个模块的列表 (浅层到深层)
expert_type: "snake"

topo_loss:
  name: "clce"      # 选项: "clce" 或 "cldice"
  weight: 0.5       # 拓扑 Loss 权重

loss_configs:
  label_loss:
    _target_: utils.mutil_supervision.label_loss.FullLabelLoss
    dice_weight: 0.9
    ce_weight: 0.1

trainer:
  lightning_trainer:
    max_epochs: 200
    val_check_interval: 1.0
    log_every_n_steps: 10
  lightning_module:
    _target_: utils.mutil_supervision.module.WeakPLModule
    _partial_: True
    prediction_threshold: 0.5
    loss: null
    optimizer_config:
      lr: ${lr}
      weight_decay: 1e-5